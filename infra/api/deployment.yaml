apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: crypto-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      # Pin to the "api VPS" node
      nodeSelector:
        vps-role: api
      containers:
        - name: api
          image: crypto-api:latest
          # Never pull — image was imported directly via k3d image import
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: JWT_SECRET
            - name: BTCPAY_URL
              value: "http://btcpayserver:14142"
            - name: BTCPAY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: BTCPAY_API_KEY
            - name: BTCPAY_STORE_ID
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: BTCPAY_STORE_ID
            - name: BTCPAY_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: BTCPAY_WEBHOOK_SECRET